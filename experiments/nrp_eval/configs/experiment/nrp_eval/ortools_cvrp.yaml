# @package _global_

defaults:
  - override /env: cvrp
  - override /callbacks: default
  - override /trainer: default
  - override /logger: wandb

env:
  generator_params:
    num_loc: 100

logger:
  wandb:
    project: "rl4co"
    tags: ["ortools", "cvrp", "nrp_eval"]
    group: "ortools-cvrp100"
    name: "ortools-cvrp100"

trainer:
  max_epochs: 0

seed: 1234
solver_name: ortools_vrp
solver:
  ortools_vrp:
    max_runtime_s: 1.0

evaluate:
  method: greedy
  num_instances: 1000
