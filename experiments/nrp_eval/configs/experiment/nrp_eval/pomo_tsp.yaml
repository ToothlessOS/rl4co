# @package _global_

defaults:
  - override /model: pomo
  - override /env: tsp
  - override /callbacks: default
  - override /trainer: default
  - override /logger: wandb

env:
  generator_params:
    num_loc: 100

logger:
  wandb:
    project: "rl4co"
    tags: ["pomo", "tsp", "nrp_eval"]
    group: "pomo-tsp100"
    name: "pomo-tsp100"

model:
  batch_size: 64
  train_data_size: 100_000
  val_data_size: 1_000
  test_data_size: 1_000
  optimizer_kwargs:
    lr: 1e-4

trainer:
  max_epochs: 100

seed: 1234
solver_name: pomo
solver:
  pomo:
    decode_type: augment_dihedral_8
    num_augment: 8

evaluate:
  method: augment_dihedral_8
  num_instances: 1000
