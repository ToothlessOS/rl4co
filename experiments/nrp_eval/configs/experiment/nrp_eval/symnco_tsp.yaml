# @package _global_

defaults:
  - override /model: symnco
  - override /env: tsp
  - override /callbacks: default
  - override /trainer: default
  - override /logger: wandb

env:
  generator_params:
    num_loc: 50

logger:
  wandb:
    project: "rl4co"
    tags: ["symnco", "tsp", "nrp_eval"]
    group: "symnco-tsp50"
    name: "symnco-tsp50"

model:
  batch_size: 64
  train_data_size: 100_000
  val_data_size: 1_000
  test_data_size: 1_000
  optimizer_kwargs:
    lr: 1e-4

trainer:
  max_epochs: 100

seed: 1234
solver_name: symnco
solver:
  symnco:
    decode_type: augment
    num_augment: 4

evaluate:
  method: augment
  num_instances: 1000
