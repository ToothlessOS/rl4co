defaults:
  - model_checkpoint.yaml
  - model_summary.yaml
  - rich_progress_bar.yaml
  - learning_rate_monitor.yaml
  - _self_

model_checkpoint:
  dirpath: ${paths.output_dir}/checkpoints
  filename: "epoch_{epoch:03d}"
  monitor: "val/edge_accuracy"
  mode: "max"
  save_last: True
  auto_insert_metric_name: False
  save_top_k: 1

model_summary:
  max_depth: 3