[project.optional-dependencies]
dev = [
    "pre-commit>=3.3.3",
    "ruff",
    "pytest",
    "pytest-cov",
    "pytest-xdist>=3.7.0",
    "black",
]
graph = ["torch_geometric"]
routing = [
    "numba>=0.58.1",
    "pyvrp>=0.9.0 ; python_version < '4.0'",
]
experiments = [
    "vrplib",
    "scikit-learn",
    "numpy",
]
docs = [
    "mkdocs",
    "mkdocs-material",
    "mkdocstrings-python",
    "mike",
    "mkdocs-jupyter",
    "mkdocs-redirects",
    "mkdocs-autolinks-plugin",
    "griffe-typingdoc",
    "griffe-inherited-docstrings",
    "griffe",
    "black",
    "mkdocs-same-dir",
    "mdx-breakless-lists",
    "mdx-truly-sane-lists",
    "markdown-gfm-admonition",
